<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C Struct Alignment Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>C Struct Memory Alignment Visualizer</h1>
            <p>Paste a C struct below and select the architecture.</p>
            <a href="https://github.com/staruwos/structviz" target="_blank" class="github-btn">
                <svg height="14" width="14" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                View on GitHub
            </a>
        </header>

        <main>
            <div class="row">
                <div class="panel input-panel">
                    <label for="struct-input"><strong>Original Struct:</strong></label>
                    <textarea id="struct-input" spellcheck="false">struct Example {
    char a;
    long b;
    char c;
    void *d;
};</textarea>
                    
                    <div class="control-group">
                        <label for="arch-select"><strong>Architecture Data Model:</strong></label>
                        <select id="arch-select">
                            <option value="lp64">64-bit Unix/macOS/Linux (LP64)</option>
                            <option value="llp64">64-bit Windows (LLP64)</option>
                            <option value="ilp32">32-bit Systems (ILP32)</option>
                            <option value="cc65">8-bit 6502 (cc65)</option>
                        </select>
                    </div>

                    <button id="check-btn">CHECK ALIGNMENT</button>
                    <div id="error-msg" class="error hidden"></div>
                </div>

                <div class="panel output-panel">
                    <div class="legend">
                        <span class="legend-item"><div class="box byte-member" style="background: #4363d8;"></div> Member</span>
                        <span class="legend-item"><div class="box byte-padding"></div> Padding</span>
                    </div>
                    <div id="summary">
                        <h2>Original Size: <span id="total-size">0</span> bytes</h2>
                    </div>
                    <div class="grid-container">
                        <div id="memory-grid" class="memory-grid"></div>
                    </div>
                </div>
            </div>

            <!---<div class="row">
                <div class="panel input-panel">
                    <label for="optimized-input"><strong>Optimized Struct (Reordered):</strong></label>
                    <textarea id="optimized-input" readonly class="readonly-text"></textarea>
                </div>

                <div class="panel output-panel">
                    <div class="legend">
                        <span class="legend-item"><div class="box byte-member" style="background: #3cb44b;"></div> Member</span>
                        <span class="legend-item"><div class="box byte-padding"></div> Padding</span>
                    </div>
                    <div id="summary">
                        <h2>Optimized Size: <span id="optimized-total-size">0</span> bytes</h2>
                    </div>
                    <div class="grid-container">
                        <div id="optimized-memory-grid" class="memory-grid"></div>
                    </div>
                </div>
            </div>-->
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
